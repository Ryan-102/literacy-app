<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="专为小学生设计的识字练习工具，课标同步，趣味闯关，让孩子在游戏中轻松识字。">
  <meta property="og:title" content="识字小乐园 — 孩子的识字好帮手">
  <meta property="og:description" content="课标同步，趣味闯关，让孩子在游戏中轻松识字。手机直接打开就能用！">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="识字小乐园">
  <title>🌟 识字小乐园 — 课标版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      background: linear-gradient(145deg, #fde9e0 0%, #fff3e6 100%);
      display: flex; justify-content: center; align-items: flex-start;
      padding: 12px;
    }
    .app {
      width: 100%; max-width: 800px;
      background: rgba(255,255,255,0.88); backdrop-filter: blur(12px);
      border-radius: 48px; padding: 24px 18px;
      box-shadow: 0 20px 60px rgba(255,150,100,0.20), 0 8px 24px rgba(0,0,0,0.05);
      margin: 8px 0;
    }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 6px; }
    .header h1 { font-size: 20px; background: linear-gradient(135deg,#ff8a5c,#ff6f91); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .header .stats { display: flex; gap: 8px; font-size: 12px; }
    .header .stats .badge { background: #fff0e6; padding: 3px 12px; border-radius: 30px; color: #e07a5f; font-weight: 600; white-space: nowrap; }
    .header .stats .badge span { color: #f4a261; }

    .mode-tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
    .mode-tabs button {
      flex: 1; min-width: 52px; padding: 8px 4px; border: none; border-radius: 16px;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.25s;
      background: #f0e6dc; color: #a08070;
    }
    .mode-tabs button.active { background: linear-gradient(135deg,#ff9a76,#ff6f91); color: #fff; box-shadow: 0 4px 16px rgba(255,111,145,0.35); transform: scale(1.02); }
    .mode-tabs button:hover:not(.active) { background: #e8dcd0; }
    .mode-tabs button .sub { display: block; font-size: 9px; font-weight: 400; opacity: 0.7; }

    /* ===== 进度选择器 ===== */
    .course-bar {
      display: flex; gap: 4px; margin-bottom: 12px; overflow-x: auto; padding: 4px 0;
      -webkit-overflow-scrolling: touch;
    }
    .course-bar::-webkit-scrollbar { height: 2px; }
    .course-bar::-webkit-scrollbar-thumb { background: #f0e6dc; border-radius: 4px; }
    .course-bar button {
      flex-shrink: 0; padding: 5px 14px; border: 2px solid #f0e6dc; border-radius: 16px;
      background: #fff; font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; color: #7a6050; white-space: nowrap;
    }
    .course-bar button.active { border-color: #ff9a76; background: #fff5ed; color: #e07a5f; }
    .course-bar button:hover:not(.active) { border-color: #d0c0b0; }
    .course-bar button .num { font-size: 10px; color: #b08a7a; display: block; }

    .card {
      background: #fffbf8; border-radius: 32px; padding: 24px 16px 20px;
      box-shadow: inset 0 2px 8px rgba(255,255,255,0.8), 0 8px 28px rgba(200,140,100,0.12);
      text-align: center; position: relative; min-height: 260px;
    }
    .char-display { font-size: 80px; line-height: 1.2; cursor: pointer; user-select: none; color: #3d2b1f; transition: transform 0.2s; }
    .char-display:active { transform: scale(0.92); }
    .char-display.pop { animation: pop 0.35s ease; }
    @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.15)} }
    .pinyin { font-size: 26px; color: #f4a261; margin: 2px 0 4px; font-weight: 500; letter-spacing: 2px; }
    .meaning { font-size: 16px; color: #b08a7a; margin-bottom: 8px; }
    .sentence { font-size: 15px; color: #c4a090; margin-bottom: 10px; font-style: italic; }

    .char-progress {
      display: flex; justify-content: center; gap: 3px; flex-wrap: wrap; margin: 8px 0 12px;
    }
    .char-progress .dot { width: 7px; height: 7px; border-radius: 50%; background: #f0e6dc; transition: all 0.3s; cursor: pointer; }
    .char-progress .dot.known { background: #7ec8a0; }
    .char-progress .dot.weak { background: #e07070; animation: weakPulse 1.5s infinite; }
    .char-progress .dot.current { transform: scale(1.6); background: #ff9a76; }
    .char-progress .dot.current.weak { background: #e07070; }
    @keyframes weakPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .nav-buttons { display: flex; justify-content: center; gap: 10px; margin-top: 4px; flex-wrap: wrap; }
    .nav-buttons button {
      width: 44px; height: 44px; border-radius: 50%; border: none; background: #f5ebe3;
      font-size: 18px; cursor: pointer; transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: inline-flex; align-items: center; justify-content: center;
    }
    .nav-buttons button:hover { background: #ecddd2; transform: scale(1.06); }
    .nav-buttons button:active { transform: scale(0.92); }
    .nav-buttons button:disabled { opacity: 0.3; cursor: default; transform: none; }

    /* ===== 测验 ===== */
    .quiz-char { font-size: 68px; margin: 6px 0 12px; color: #3d2b1f; }
    .quiz-question { font-size: 15px; color: #b08a7a; margin-bottom: 4px; }
    .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-width: 400px; margin: 0 auto; }
    .quiz-options button {
      padding: 12px 6px; border: 3px solid #f0e6dc; border-radius: 20px;
      background: #fff; font-size: 20px; font-weight: 500; cursor: pointer;
      transition: all 0.2s; color: #3d2b1f;
    }
    .quiz-options button:hover { border-color: #ff9a76; background: #fff5ed; }
    .quiz-options button.correct { border-color: #7ec8a0; background: #e8f8ee; animation: correctPop 0.4s ease; }
    .quiz-options button.wrong { border-color: #e07070; background: #fde8e8; animation: shake 0.35s ease; }
    .quiz-options button:disabled { opacity: 0.6; cursor: default; }
    @keyframes correctPop { 0%{transform:scale(1)} 50%{transform:scale(1.06)} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    .quiz-result { margin-top: 10px; font-size: 14px; font-weight: 600; min-height: 24px; }
    .quiz-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; flex-wrap: wrap; gap: 6px; }
    .quiz-footer button {
      padding: 8px 24px; border: none; border-radius: 30px; font-size: 14px; font-weight: 600;
      cursor: pointer; background: linear-gradient(135deg,#ff9a76,#ff6f91); color: #fff;
      box-shadow: 0 4px 12px rgba(255,111,145,0.25); transition: all 0.2s;
    }
    .quiz-footer button:hover { transform: scale(1.04); }
    .quiz-footer .quiz-progress { font-size: 12px; color: #b08a7a; }
    .quiz-footer .quiz-progress .wrong-count { color: #e07070; font-weight: 600; }

    /* ===== 配对 ===== */
    .match-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-width: 400px; margin: 0 auto; }
    .match-card {
      aspect-ratio: 1; border-radius: 18px; display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 600; cursor: pointer; transition: all 0.3s;
      border: 3px solid #f0e6dc; background: #fff; color: #3d2b1f; user-select: none;
    }
    .match-card.flipped { border-color: #ff9a76; background: #fff5ed; transform: scale(1.02); }
    .match-card.matched { border-color: #7ec8a0; background: #e8f8ee; cursor: default; opacity: 0.6; transform: scale(0.95); }
    .match-card.matched::after { content: " ✓"; font-size: 14px; color: #7ec8a0; }
    .match-card.wrong-pick { border-color: #e07070; background: #fde8e8; animation: shake 0.3s ease; }
    .match-info { margin-top: 10px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }

    /* ===== 写字 ===== */
    .write-area { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .write-canvas-wrap { position: relative; border: 4px solid #f0e6dc; border-radius: 22px; background: #fff; width: 220px; height: 220px; cursor: crosshair; overflow: hidden; }
    .write-canvas-wrap canvas { display: block; width: 100%; height: 100%; touch-action: none; }
    .write-char-ref { font-size: 40px; color: #3d2b1f; min-height: 50px; }
    .write-buttons { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .write-buttons button { padding: 7px 20px; border: none; border-radius: 30px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .write-buttons .btn-speak { background: linear-gradient(135deg,#ff9a76,#ff6f91); color: #fff; box-shadow: 0 4px 12px rgba(255,111,145,0.3); }
    .write-buttons .btn-speak:hover { transform: scale(1.04); }
    .write-buttons .btn-clear { background: #f0e6dc; color: #7a6050; }
    .write-buttons .btn-clear:hover { background: #e5d8cb; }

    /* ===== 进度面板 ===== */
    .progress-panel { margin-top: 12px; }
    .progress-bar-bg { height: 10px; background: #f0e6dc; border-radius: 30px; overflow: hidden; margin: 4px 0 10px; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg,#7ec8a0,#4caf7a); border-radius: 30px; transition: width 0.5s; }
    .progress-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 10px; }
    .progress-stats .stat { background: #fcf6f0; border-radius: 14px; padding: 8px; text-align: center; }
    .progress-stats .stat .num { font-size: 20px; font-weight: 700; color: #3d2b1f; }
    .progress-stats .stat .label { font-size: 10px; color: #b08a7a; margin-top: 2px; }
    .weak-list { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
    .weak-list .weak-item {
      background: #fde8e8; border-radius: 12px; padding: 5px 14px; font-size: 16px;
      border: 2px solid #e07070; cursor: pointer; transition: all 0.2s;
    }
    .weak-list .weak-item:hover { transform: scale(1.06); }
    .weak-list .weak-item .p { font-size: 10px; color: #e07070; display: block; text-align: center; }

    /* ===== 设置 ===== */
    .settings-area { margin-top: 14px; text-align: left; }
    .settings-area summary { cursor: pointer; font-size: 13px; color: #b08a7a; font-weight: 600; padding: 6px 0; user-select: none; }
    .settings-area summary:hover { color: #ff9a76; }
    .settings-content { padding: 12px 0; }
    .settings-content label { display: block; font-size: 13px; color: #7a6050; margin-bottom: 3px; font-weight: 600; }
    .settings-content textarea {
      width: 100%; min-height: 100px; border: 2px solid #f0e6dc; border-radius: 14px;
      padding: 10px; font-size: 13px; font-family: inherit; resize: vertical;
      background: #fffcf9; color: #3d2b1f;
    }
    .settings-content textarea:focus { outline: none; border-color: #ff9a76; }
    .settings-content .hint { font-size: 11px; color: #c4a090; margin: 3px 0 6px; }
    .settings-content .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .settings-content button {
      padding: 8px 22px; border: none; border-radius: 30px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .settings-content .btn-primary { background: linear-gradient(135deg,#ff9a76,#ff6f91); color: #fff; }
    .settings-content .btn-primary:hover { transform: scale(1.04); }
    .settings-content .btn-secondary { background: #f0e6dc; color: #7a6050; }
    .settings-content .btn-secondary:hover { background: #e5d8cb; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: rgba(0,0,0,0.78); color: #fff; padding: 10px 24px; border-radius: 40px;
      font-size: 15px; backdrop-filter: blur(6px); opacity: 0; transition: all 0.35s ease;
      pointer-events: none; z-index: 999; text-align: center; max-width: 85vw;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 500px) {
      .app { padding: 14px 10px; border-radius: 28px; }
      .char-display { font-size: 60px; }
      .quiz-char { font-size: 52px; }
      .quiz-options button { font-size: 16px; padding: 8px 4px; }
      .match-grid { grid-template-columns: repeat(3, 1fr); }
      .match-card { font-size: 22px; }
      .write-canvas-wrap { width: 180px; height: 180px; }
      .header h1 { font-size: 16px; }
      .mode-tabs button { font-size: 11px; padding: 6px 2px; }
      .course-bar button { font-size: 11px; padding: 4px 10px; }
      .progress-stats { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>🌟 识字小乐园</h1>
    <div class="stats">
      <span class="badge">✅ <span id="scoreCount">0</span></span>
      <span class="badge">🔴 <span id="weakCount">0</span></span>
    </div>
  </div>

  <!-- 模式 -->
  <div class="mode-tabs">
    <button class="active" data-mode="learn" onclick="switchMode('learn')">📖 识字</button>
    <button data-mode="quiz" onclick="switchMode('quiz')">🎯 测验</button>
    <button data-mode="match" onclick="switchMode('match')">🃏 配对</button>
    <button data-mode="write" onclick="switchMode('write')">✏️ 写字</button>
    <button data-mode="progress" onclick="switchMode('progress')">📊 进度</button>
  </div>

  <!-- 进度/课程选择器 -->
  <div class="course-bar" id="courseBar"></div>

  <!-- ===== 识字 ===== -->
  <div class="card" id="learnPanel">
    <div class="char-display" id="charDisplay" onclick="speakCurrent()">大</div>
    <div class="pinyin" id="pinyin">dà</div>
    <div class="meaning" id="meaning">大小、大人</div>
    <div class="sentence" id="sentence">我是一个大孩子</div>
    <div class="char-progress" id="charProgress"></div>
    <div class="nav-buttons">
      <button onclick="prevChar()" id="prevBtn">◀</button>
      <button onclick="markKnown()" id="knownBtn">✅</button>
      <button onclick="speakCurrent()">🔊</button>
      <button onclick="weakToggle()" id="weakBtn">🔴</button>
      <button onclick="nextChar()" id="nextBtn">▶</button>
    </div>
  </div>

  <!-- ===== 测验 ===== -->
  <div class="card" id="quizPanel" style="display:none;">
    <div class="quiz-question" id="quizQuestion">这个字怎么读？</div>
    <div class="quiz-char" id="quizChar">大</div>
    <div class="quiz-options" id="quizOptions"></div>
    <div class="quiz-result" id="quizResult"></div>
    <div class="quiz-footer">
      <span class="quiz-progress" id="quizProgress">📝 第 1/10 题</span>
      <button onclick="nextQuiz()">下一题 ▶</button>
    </div>
  </div>

  <!-- ===== 配对 ===== -->
  <div class="card" id="matchPanel" style="display:none;">
    <div style="font-size:15px;color:#b08a7a;margin-bottom:8px;">🃏 汉字 ↔ 拼音 配对</div>
    <div class="match-grid" id="matchGrid"></div>
    <div class="match-info">
      <span id="matchResult" style="font-size:14px;font-weight:600;color:#7ec8a0;min-height:22px;"></span>
      <button onclick="initMatchGame()" style="padding:6px 20px;border:none;border-radius:30px;font-size:13px;font-weight:600;cursor:pointer;background:#f0e6dc;color:#7a6050;">🔄 重新洗牌</button>
    </div>
  </div>

  <!-- ===== 写字 ===== -->
  <div class="card" id="writePanel" style="display:none;">
    <div class="write-area">
      <div class="write-char-ref" id="writeCharRef">大</div>
      <div class="write-canvas-wrap"><canvas id="writeCanvas" width="440" height="440"></canvas></div>
      <div class="write-buttons">
        <button class="btn-speak" onclick="speakCurrent()">🔊 听发音</button>
        <button class="btn-clear" onclick="clearCanvas()">🧽 擦掉</button>
      </div>
    </div>
  </div>

  <!-- ===== 进度 ===== -->
  <div class="card" id="progressPanel" style="display:none;">
    <div class="progress-panel">
      <div style="font-size:16px;font-weight:600;color:#3d2b1f;margin-bottom:4px;">
        📊 <span id="courseName">全部字</span> 学习进度
      </div>
      <div class="progress-stats">
        <div class="stat"><div class="num" id="pKnown">0</div><div class="label">已认识 ✅</div></div>
        <div class="stat"><div class="num" id="pWeak">0</div><div class="label">需加强 🔴</div></div>
        <div class="stat"><div class="num" id="pTotal">0</div><div class="label">总字数 📚</div></div>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
      <div style="font-size:13px;font-weight:600;color:#7a6050;text-align:left;margin-bottom:4px;">🔴 需要加强的字</div>
      <div class="weak-list" id="weakList"></div>
    </div>

    <details class="settings-area">
      <summary>⚙️ 高级设置 — 自定义字表 / 导入学校内容</summary>
      <div class="settings-content">
        <label for="customWords">📝 粘贴 Alfa 学校的字表（每行：汉字,拼音,组词）</label>
        <textarea id="customWords" placeholder="爱,ài,爱心&#10;学,xué,学习&#10;校,xiào,学校"></textarea>
        <div class="hint">💡 也可以直接粘贴课本后面的「识字表」或「写字表」</div>
        <div class="btn-row">
          <button class="btn-primary" onclick="applyCustomWords()">✅ 应用字表</button>
          <button class="btn-secondary" onclick="resetToDefault()">🔄 恢复课标字表</button>
          <button class="btn-secondary" onclick="exportData()">💾 导出进度</button>
          <button class="btn-secondary" onclick="importData()">📂 导入进度</button>
        </div>
        <div style="margin-top:6px;font-size:12px;color:#7ec8a0;" id="wordCountInfo"></div>
      </div>
    </details>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ================================================================
// 《义务教育语文课程标准（2022年版）》附录4
// 识字、写字教学基本字表 — 300个基本字
// 按教材常见顺序分组（每组约25字，共12组）
// ================================================================
const CURRICULUM_WORDS = [
  // B
  { char: "八", pinyin: "bā", meaning: "八个、八方", initial: "B" },
  { char: "把", pinyin: "bǎ", meaning: "一把、把手", initial: "B" },
  { char: "爸", pinyin: "bà", meaning: "爸爸", initial: "B" },
  { char: "白", pinyin: "bái", meaning: "白色、白云", initial: "B" },
  { char: "百", pinyin: "bǎi", meaning: "一百、百姓", initial: "B" },
  { char: "班", pinyin: "bān", meaning: "班级、上班", initial: "B" },
  { char: "办", pinyin: "bàn", meaning: "办法、办公", initial: "B" },
  { char: "半", pinyin: "bàn", meaning: "一半、半天", initial: "B" },
  { char: "包", pinyin: "bāo", meaning: "书包、包子", initial: "B" },
  { char: "饱", pinyin: "bǎo", meaning: "吃饱、饱满", initial: "B" },
  { char: "北", pinyin: "běi", meaning: "北方、北边", initial: "B" },
  { char: "贝", pinyin: "bèi", meaning: "贝壳、宝贝", initial: "B" },
  { char: "被", pinyin: "bèi", meaning: "被子、被动", initial: "B" },
  { char: "本", pinyin: "běn", meaning: "书本、本子", initial: "B" },
  { char: "比", pinyin: "bǐ", meaning: "比赛、对比", initial: "B" },
  { char: "边", pinyin: "biān", meaning: "一边、旁边", initial: "B" },
  { char: "别", pinyin: "bié", meaning: "别人、分别", initial: "B" },
  { char: "不", pinyin: "bù", meaning: "不好、不行", initial: "B" },
  // C
  { char: "才", pinyin: "cái", meaning: "才能、刚才", initial: "C" },
  { char: "草", pinyin: "cǎo", meaning: "小草、草地", initial: "C" },
  { char: "册", pinyin: "cè", meaning: "册子、手册", initial: "C" },
  { char: "长", pinyin: "cháng", meaning: "长短、长大", initial: "C" },
  { char: "厂", pinyin: "chǎng", meaning: "工厂、厂房", initial: "C" },
  { char: "吵", pinyin: "chǎo", meaning: "吵闹、争吵", initial: "C" },
  { char: "车", pinyin: "chē", meaning: "汽车、火车", initial: "C" },
  { char: "成", pinyin: "chéng", meaning: "成为、成功", initial: "C" },
  { char: "吃", pinyin: "chī", meaning: "吃饭、好吃", initial: "C" },
  { char: "尺", pinyin: "chǐ", meaning: "尺子、直尺", initial: "C" },
  { char: "虫", pinyin: "chóng", meaning: "虫子、小虫", initial: "C" },
  { char: "出", pinyin: "chū", meaning: "出去、出来", initial: "C" },

// ================================================================
// 状态
// ================================================================
let words = [];
let originalWords = [];     // 自定义前的备份
let knownSet = new Set();
let wrongCount = {};
let currentIndex = 0;
let mode = 'learn';
let activeCourse = -1;      // -1 = 全部

const STORAGE_KEY = 'liti_known';
const WRONG_KEY = 'liti_wrong';
const CUSTOM_KEY = 'liti_custom';
const COURSE_KEY = 'liti_course';

// 测验状态
let quizOrder = [];
let quizIndex = 0;
let quizAnswered = false;
let quizWrongTotal = 0;

// 配对状态
let matchCards = [];
let matchFlipped = [];
let matchMatchedIds = new Set();
let matchLocked = false;

// ================================================================
// 初始化
// ================================================================
function init() {
  const saved = localStorage.getItem(CUSTOM_KEY);
  if (saved) {
    try { words = JSON.parse(saved); } catch(e) {}
  }
  if (!words || words.length === 0) {
    words = [...CURRICULUM_WORDS];
  }
  originalWords = [...words];
  loadData();
  buildCourseBar();
  restoreCourse();
  renderChar(0);
  updateAll();
  setTimeout(initCanvas, 100);
}

function loadData() {
  try { knownSet = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')); } catch(e) {}
  try { wrongCount = JSON.parse(localStorage.getItem(WRONG_KEY) || '{}'); } catch(e) {}
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...knownSet]));
  localStorage.setItem(WRONG_KEY, JSON.stringify(wrongCount));
}

// ================================================================
// 课程选择器
// ================================================================
function buildCourseBar() {
  const bar = document.getElementById('courseBar');
  bar.innerHTML = '<button class="active" data-idx="-1" onclick="selectCourse(-1)">📚 全部 300字</button>';
  Object.keys(PINYIN_GROUPS).forEach((key, i) => {
    const g = PINYIN_GROUPS[key];
    const btn = document.createElement('button');
    btn.dataset.idx = i;
    const count = g.end - g.start + 1;
    btn.innerHTML = key + ' <span class="num">' + count + '字</span>';
    btn.title = g.chars;
    btn.onclick = () => selectCourse(i);
    bar.appendChild(btn);
  });
}

function selectCourse(idx) {
  activeCourse = idx;
  localStorage.setItem(COURSE_KEY, idx);
  document.querySelectorAll('#courseBar button').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.idx) === idx);
  });
  currentIndex = 0;
  renderChar(0);
  updateAll();
}

function restoreCourse() {
  const saved = parseInt(localStorage.getItem(COURSE_KEY) || '-1');
  selectCourse(isNaN(saved) ? -1 : saved);
}

function getActiveWords() {
  if (activeCourse < 0) return words;
  const keys = Object.keys(PINYIN_GROUPS);
  const g = PINYIN_GROUPS[keys[activeCourse]];
  return words.slice(g.start, g.end + 1);
}

function getGlobalIndex(localIdx) {
  if (activeCourse < 0) return localIdx;
  const keys = Object.keys(PINYIN_GROUPS);
  return PINYIN_GROUPS[keys[activeCourse]].start + localIdx;
}

// ================================================================
// 语音
// ================================================================
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN'; u.rate = 0.85; u.pitch = 1.1;
  const voices = speechSynthesis.getVoices();
  const zh = voices.find(v => v.lang.startsWith('zh'));
  if (zh) u.voice = zh;
  speechSynthesis.speak(u);
}

function speakCurrent() {
  const active = getActiveWords();
  const c = active[currentIndex];
  if (!c) return;
  speak(c.char);
  if (mode === 'learn') {
    const el = document.getElementById('charDisplay');
    el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
  }
}

// ================================================================
// 识字模式
// ================================================================
function renderChar(index) {
  const active = getActiveWords();
  const c = active[index];
  if (!c) return;
  document.getElementById('charDisplay').textContent = c.char;
  document.getElementById('pinyin').textContent = c.pinyin;
  document.getElementById('meaning').textContent = c.meaning;
  document.getElementById('sentence').textContent = c.char + ' — ' + (makeSentence(c));
  document.getElementById('prevBtn').disabled = index === 0;
  document.getElementById('nextBtn').disabled = index === active.length - 1;
  updateProgress();
  updateButtons();
}

function makeSentence(c) {
  for (const w of words) {
    if (w.char === c.char && w.meaning) {
      const parts = w.meaning.split('、');
      for (const p of parts) {
        if (p.length >= 2) return '我喜欢' + p;
      }
    }
  }
  return '这是「' + c.char + '」字';
}

function updateProgress() {
  const active = getActiveWords();
  const el = document.getElementById('charProgress');
  el.innerHTML = active.map((_, i) => {
    const gi = getGlobalIndex(i);
    let cls = 'dot';
    if (knownSet.has(gi)) cls += ' known';
    if (getWrong(gi) > 0) cls += ' weak';
    if (i === currentIndex) cls += ' current';
    return `<span class="${cls}" onclick="jumpTo(${i})" title="${_.char}"></span>`;
  }).join('');
}

function updateButtons() {
  const gi = getGlobalIndex(currentIndex);
  const known = knownSet.has(gi);
  document.getElementById('knownBtn').textContent = known ? '✅' : '✅';
  document.getElementById('knownBtn').style.opacity = known ? '0.6' : '1';
  document.getElementById('weakBtn').style.opacity = getWrong(gi) > 0 ? '1' : '0.3';
}

function markKnown() {
  const gi = getGlobalIndex(currentIndex);
  knownSet.add(gi);
  wrongCount[words[gi]?.char] = 0;
  saveData(); updateAll();
  showToast('🌟 记住啦！');
  autoAdvance();
}

function weakToggle() {
  const gi = getGlobalIndex(currentIndex);
  const c = words[gi]?.char;
  if (wrongCount[c] > 0) {
    wrongCount[c] = 0;
    showToast('👍 已移除加强标记');
  } else {
    wrongCount[c] = (wrongCount[c] || 0) + 3;
    showToast('🔴 标记为需要加强');
  }
  saveData(); updateAll();
}

function getWrong(index) { return wrongCount[words[index]?.char] || 0; }

function autoAdvance() {
  const active = getActiveWords();
  for (let i = currentIndex + 1; i < active.length; i++) {
    const gi = getGlobalIndex(i);
    if (!knownSet.has(gi) && getWrong(gi) === 0) { currentIndex = i; renderChar(i); return; }
  }
  for (let i = currentIndex + 1; i < active.length; i++) {
    if (getWrong(getGlobalIndex(i)) > 0) { currentIndex = i; renderChar(i); return; }
  }
  if (currentIndex < active.length - 1) { currentIndex++; renderChar(currentIndex); }
}

function nextChar() {
  const active = getActiveWords();
  if (currentIndex < active.length - 1) { currentIndex++; renderChar(currentIndex); speakCurrent(); }
}
function prevChar() {
  if (currentIndex > 0) { currentIndex--; renderChar(currentIndex); speakCurrent(); }
}
function jumpTo(i) { currentIndex = i; renderChar(i); }

// ================================================================
// 智能测验
// ================================================================
function generateQuiz() {
  const active = getActiveWords();
  const unknown = [], known = [];
  active.forEach((_, i) => {
    const gi = getGlobalIndex(i);
    if (knownSet.has(gi) && getWrong(gi) === 0) known.push(i);
    else unknown.push(i);
  });
  unknown.sort((a, b) => getWrong(getGlobalIndex(b)) - getWrong(getGlobalIndex(a)));
  const chosen = unknown.slice(0, 8);
  if (chosen.length < 10) {
    const sk = [...known];
    for (let i = sk.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [sk[i],sk[j]]=[sk[j],sk[i]]; }
    chosen.push(...sk.slice(0, 10 - chosen.length));
  }
  quizOrder = chosen.slice(0, 10);
  quizIndex = 0;
  quizWrongTotal = 0;
}

function renderQuiz() {
  if (!quizOrder.length || quizIndex >= quizOrder.length) { generateQuiz(); }
  const active = getActiveWords();
  const idx = quizOrder[quizIndex];
  const c = active[idx];
  if (!c) { generateQuiz(); return renderQuiz(); }
  document.getElementById('quizChar').textContent = c.char;
  document.getElementById('quizQuestion').textContent = getWrong(getGlobalIndex(idx)) > 0 ? '🔴 这个字要多练习！怎么读？' : '这个字怎么读？';
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizProgress').textContent = `📝 第 ${quizIndex+1}/${quizOrder.length} 题 | ❌ 错 ${quizWrongTotal} 次`;
  const correct = c.pinyin;
  let dist = words.filter((w, i) => i !== getGlobalIndex(idx) && w.pinyin !== correct).map(w => w.pinyin);
  dist = [...new Set(dist)];
  for (let i = dist.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [dist[i],dist[j]]=[dist[j],dist[i]]; }
  const opts = [correct, ...dist.slice(0, 3)];
  for (let i = opts.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [opts[i],opts[j]]=[opts[j],opts[i]]; }
  const container = document.getElementById('quizOptions');
  container.innerHTML = '';
  quizAnswered = false;
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.textContent = opt;
    btn.onclick = () => handleQuizAnswer(btn, opt, correct, getGlobalIndex(idx));
    container.appendChild(btn);
  });
}

function handleQuizAnswer(btn, selected, correct, gi) {
  if (quizAnswered) return;
  quizAnswered = true;
  const buttons = document.querySelectorAll('#quizOptions button');
  buttons.forEach(b => b.disabled = true);
  const char = words[gi].char;
  if (selected === correct) {
    btn.classList.add('correct');
    document.getElementById('quizResult').textContent = '🎉 正确！';
    document.getElementById('quizResult').style.color = '#7ec8a0';
    if (wrongCount[char] > 0) wrongCount[char] = Math.max(0, wrongCount[char]-1);
    speak(words[gi].char);
  } else {
    btn.classList.add('wrong');
    buttons.forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
    document.getElementById('quizResult').textContent = '🤔 正确答案是 "' + correct + '"';
    document.getElementById('quizResult').style.color = '#e07070';
    wrongCount[char] = (wrongCount[char] || 0) + 1;
    quizWrongTotal++;
  }
  saveData(); updateAll();
}

function nextQuiz() {
  quizIndex++;
  if (quizIndex >= quizOrder.length) generateQuiz();
  renderQuiz();
}

// ================================================================
// 配对游戏
// ================================================================
function initMatchGame() {
  const active = getActiveWords();
  // 优先从不认识的字里选
  let candidates = [];
  active.forEach((_, i) => {
    const gi = getGlobalIndex(i);
    if (!knownSet.has(gi) || getWrong(gi) > 0) candidates.push(i);
  });
  if (candidates.length < 6) {
    const rest = active.map((_, i) => i).filter(i => !candidates.includes(i));
    for (let i = rest.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [rest[i],rest[j]]=[rest[j],rest[i]]; }
    candidates = [...candidates, ...rest.slice(0, 6 - candidates.length)];
  }
  const selected = candidates.slice(0, 6);
  const cards = [];
  selected.forEach((idx, i) => {
    cards.push({ id: i, type: 'char', content: active[idx].char, wordIdx: getGlobalIndex(idx), flipped: false, matched: false });
    cards.push({ id: i, type: 'pinyin', content: active[idx].pinyin, wordIdx: getGlobalIndex(idx), flipped: false, matched: false });
  });
  for (let i = cards.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [cards[i],cards[j]]=[cards[j],cards[i]]; }
  matchCards = cards;
  matchFlipped = [];
  matchMatchedIds = new Set();
  matchLocked = false;
  document.getElementById('matchResult').textContent = '';
  renderMatchGrid();
}

function renderMatchGrid() {
  const grid = document.getElementById('matchGrid');
  grid.innerHTML = '';
  matchCards.forEach((card, i) => {
    const div = document.createElement('div');
    div.className = 'match-card';
    if (card.flipped || card.matched) { div.classList.add('flipped'); div.textContent = card.content; }
    else { div.textContent = '?'; }
    if (card.matched) { div.classList.add('matched'); div.textContent = card.content + ' ✓'; }
    div.onclick = () => flipMatchCard(i);
    grid.appendChild(div);
  });
}

function flipMatchCard(index) {
  if (matchLocked) return;
  const card = matchCards[index];
  if (card.flipped || card.matched) return;
  if (matchFlipped.length >= 2) return;
  card.flipped = true;
  matchFlipped.push(index);
  renderMatchGrid();
  if (matchFlipped.length === 2) {
    const i1 = matchFlipped[0], i2 = matchFlipped[1];
    const c1 = matchCards[i1], c2 = matchCards[i2];
    if (c1.id === c2.id && c1.type !== c2.type) {
      c1.matched = true; c2.matched = true;
      matchMatchedIds.add(c1.id);
      matchFlipped = [];
      renderMatchGrid();
      knownSet.add(c1.wordIdx);
      if (wrongCount[words[c1.wordIdx]?.char]) wrongCount[words[c1.wordIdx].char] = 0;
      saveData(); updateAll();
      document.getElementById('matchResult').textContent = '🎉 配对成功！' + matchMatchedIds.size + '/6';
      if (matchMatchedIds.size === 6) { document.getElementById('matchResult').textContent = '🎊 全部完成！'; showToast('🎊 全部配对完成！'); }
    } else {
      matchLocked = true;
      const grid = document.getElementById('matchGrid');
      grid.children[i1].classList.add('wrong-pick');
      grid.children[i2].classList.add('wrong-pick');
      setTimeout(() => { c1.flipped = false; c2.flipped = false; matchFlipped = []; matchLocked = false; renderMatchGrid(); }, 700);
    }
  }
}

// ================================================================
// 写字板
// ================================================================
const canvas = document.getElementById('writeCanvas');
const ctx = canvas.getContext('2d');
let isDrawing = false;
let lastX = 0, lastY = 0;

function initCanvas() {
  const wrap = canvas.parentElement;
  const rect = wrap.getBoundingClientRect();
  const size = Math.min(rect.width, rect.height) * 2;
  canvas.width = size; canvas.height = size;
  canvas.style.width = '100%'; canvas.style.height = '100%';
  ctx.scale(2, 2);
  ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.strokeStyle = '#3d2b1f';
  clearCanvas();
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width / 2;
  const sy = canvas.height / rect.height / 2;
  return { x: (e.clientX - rect.left) * sx, y: (e.clientY - rect.top) * sy };
}
function startDraw(e) {
  isDrawing = true;
  const p = getPos(e); lastX = p.x; lastY = p.y;
  ctx.beginPath(); ctx.arc(lastX, lastY, ctx.lineWidth/2, 0, Math.PI*2); ctx.fill();
}
function draw(e) { if(!isDrawing)return; e.preventDefault();
  const p = getPos(e); ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(p.x,p.y); ctx.stroke();
  lastX=p.x; lastY=p.y;
}
function stopDraw() { isDrawing = false; }

function clearCanvas() {
  const w = canvas.width/2, h = canvas.height/2;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle = '#f0e6dc'; ctx.lineWidth = 1;
  ctx.strokeRect(3,3,w-6,h-6);
  ctx.beginPath(); ctx.moveTo(3, h/2); ctx.lineTo(w-3, h/2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w/2, 3); ctx.lineTo(w/2, h-3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(3,3); ctx.lineTo(w-3,h-3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w-3,3); ctx.lineTo(3,h-3); ctx.stroke();
  ctx.strokeStyle = '#3d2b1f'; ctx.lineWidth = 5;
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', stopDraw);
canvas.addEventListener('mouseleave', stopDraw);
canvas.addEventListener('touchstart', e=>{e.preventDefault();startDraw(e.touches[0]);});
canvas.addEventListener('touchmove', e=>{e.preventDefault();draw(e.touches[0]);});
canvas.addEventListener('touchend', stopDraw);

// ================================================================
// 进度面板
// ================================================================
function updateProgressPanel() {
  const active = getActiveWords();
  let known = 0, weak = 0;
  active.forEach((_, i) => {
    const gi = getGlobalIndex(i);
    if (knownSet.has(gi)) known++;
    if (getWrong(gi) > 0) weak++;
  });
  const total = active.length;
  document.getElementById('pKnown').textContent = known;
  document.getElementById('pWeak').textContent = weak;
  document.getElementById('pTotal').textContent = total;
  document.getElementById('progressBar').style.width = total > 0 ? `${(known/total)*100}%` : '0%';
  const courseName = activeCourse < 0 ? '全部字' : (() => { const keys = Object.keys(PINYIN_GROUPS); return keys[activeCourse] + ' 组'; })(); document.getElementById('courseName').textContent = courseName;

  const weakItems = document.getElementById('weakList');
  const weakWords = [];
  active.forEach((_, i) => {
    const gi = getGlobalIndex(i);
    if (getWrong(gi) > 0) weakWords.push({ word: words[gi], idx: i, wrong: getWrong(gi) });
  });
  weakWords.sort((a,b) => b.wrong - a.wrong);
  if (weakWords.length === 0) {
    weakItems.innerHTML = '<span style="color:#c4a090;font-size:13px;">🎉 没有需要加强的字！</span>';
  } else {
    weakItems.innerHTML = weakWords.map(w =>
      `<span class="weak-item" onclick="jumpFromWeak(${w.idx})">${w.word.char} <span class="p">${w.word.pinyin} (${w.wrong}次)</span></span>`
    ).join('');
  }
}

function jumpFromWeak(i) { currentIndex = i; switchMode('learn'); renderChar(i); speakCurrent(); }

// ================================================================
// 自定义字表
// ================================================================
function applyCustomWords() {
  const text = document.getElementById('customWords').value.trim();
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  const parsed = [];
  for (const line of lines) {
    const parts = line.split(',').map(s => s.trim());
    if (parts.length >= 1 && parts[0].length === 1) {
      parsed.push({ char: parts[0], pinyin: parts[1] || '?', meaning: parts[2] || parts[0]+'字' });
    }
  }
  if (parsed.length === 0) { showToast('⚠️ 没有有效汉字'); return; }
  originalWords = [...words];
  words = parsed;
  knownSet = new Set(); wrongCount = {}; currentIndex = 0;
  activeCourse = -1;
  localStorage.setItem(CUSTOM_KEY, JSON.stringify(words));
  saveData();
  buildCourseBar();
  selectCourse(-1);
  updateAll();
  document.getElementById('wordCountInfo').textContent = `✅ 已加载 ${words.length} 个字`;
  switchMode('learn');
  renderChar(0);
  showToast(`✅ 字表已更新！共 ${words.length} 个字（注意：课程分组已隐藏）`);
  document.getElementById('courseBar').innerHTML = '<button class="active" data-idx="-1">📚 自定义字表 <span class="num">' + words.length + '字</span></button>';
}

function resetToDefault() {
  words = [...CURRICULUM_WORDS];
  knownSet = new Set(); wrongCount = {}; currentIndex = 0; activeCourse = -1;
  localStorage.removeItem(CUSTOM_KEY);
  saveData();
  buildCourseBar();
  selectCourse(-1);
  updateAll();
  document.getElementById('customWords').value = '';
  switchMode('learn');
  renderChar(0);
  showToast('🔄 已恢复《课标》300基本字表');
}

function exportData() {
  const data = { words, known: [...knownSet], wrong: wrongCount, date: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `识字进度_${new Date().toLocaleDateString()}.json`; a.click();
  URL.revokeObjectURL(url);
  showToast('💾 已导出');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0]; if(!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (data.known) knownSet = new Set(data.known);
      if (data.wrong) wrongCount = data.wrong;
      if (data.words && Array.isArray(data.words) && data.words.length > 0) {
        words = data.words;
        localStorage.setItem(CUSTOM_KEY, JSON.stringify(words));
        buildCourseBar();
      }
      saveData(); updateAll(); updateProgressPanel();
      showToast('📂 进度已导入！');
    } catch(e) { showToast('⚠️ 导入失败'); }
  };
  input.click();
}

// ================================================================
// 模式切换
// ================================================================
function switchMode(newMode) {
  mode = newMode;
  document.querySelectorAll('.mode-tabs button').forEach(b => b.classList.toggle('active', b.dataset.mode === newMode));
  document.getElementById('learnPanel').style.display = newMode === 'learn' ? 'block' : 'none';
  document.getElementById('quizPanel').style.display = newMode === 'quiz' ? 'block' : 'none';
  document.getElementById('matchPanel').style.display = newMode === 'match' ? 'block' : 'none';
  document.getElementById('writePanel').style.display = newMode === 'write' ? 'block' : 'none';
  document.getElementById('progressPanel').style.display = newMode === 'progress' ? 'block' : 'none';
  if (newMode === 'learn') renderChar(currentIndex);
  if (newMode === 'quiz') { generateQuiz(); renderQuiz(); }
  if (newMode === 'match') initMatchGame();
  if (newMode === 'write') { document.getElementById('writeCharRef').textContent = (getActiveWords()[currentIndex]||{}).char || '大'; setTimeout(initCanvas, 50); }
  if (newMode === 'progress') updateProgressPanel();
}

// ================================================================
// 全局更新
// ================================================================
function updateAll() {
  updateProgress(); updateButtons();
  const active = getActiveWords();
  let known = 0, weak = 0;
  active.forEach((_, i) => { const gi = getGlobalIndex(i); if(knownSet.has(gi)) known++; if(getWrong(gi)>0) weak++; });
  document.getElementById('scoreCount').textContent = known;
  document.getElementById('weakCount').textContent = weak;
  saveData();
}

// ================================================================
// Toast & 快捷键
// ================================================================
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 1800);
}

document.addEventListener('keydown', e => {
  if (mode === 'learn') {
    if (e.key === 'ArrowRight') { e.preventDefault(); nextChar(); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); prevChar(); }
    if (e.key === ' '||e.key === 'Enter') { e.preventDefault(); speakCurrent(); }
    if (e.key === 'k'||e.key === 'K') { e.preventDefault(); markKnown(); }
  }
  if (mode === 'quiz') {
    if (e.key === 'ArrowRight'||e.key === 'Enter') { e.preventDefault(); nextQuiz(); }
    if (e.key >= '1' && e.key <= '4') {
      const btns = document.querySelectorAll('#quizOptions button');
      if (btns[parseInt(e.key)-1]) btns[parseInt(e.key)-1].click();
    }
  }
});

if (window.speechSynthesis) { speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices(); }

init();

let resizeTimer;
window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(() => { if(mode==='write') initCanvas(); }, 300); });
</script>
</body>
